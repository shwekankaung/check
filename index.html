<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="https://shwekankaung.github.io/imagelink/ShweKanKaung.png" type="image/ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ရွှေကံကောင်း</title>
  <style>
    .responsive-iframe {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div> 
    <!-- Allow camera and fullscreen access -->
    <iframe
      id="myframe"
      class="responsive-iframe"
      src=""
      allow="camera; microphone; fullscreen; clipboard-read; clipboard-write"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    const apps = new URL(window.location);
    const formUrl = apps.searchParams.get('apps');
    const url = decodeURIComponent(formUrl);
    document.getElementById('myframe').src = url;
  </script>
</body>
</html>
